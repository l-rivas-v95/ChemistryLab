name: Frontend Build

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
      - refactor/molecule-front

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ChemistryLabFront/chemistry-lab-front

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ChemistryLabFront/chemistry-lab-front/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
